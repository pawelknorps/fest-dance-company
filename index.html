<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Teko:wght@400;500;600;700&display=swap"
    />
    
    <!-- Primary Meta Tags -->
    <title>FEST Dance Company | Choreography & Movement Direction</title>
    <meta name="title" content="FEST Dance Company | Choreography & Movement Direction" />
    <meta name="description" content="FEST Dance Company - Premium Choreography, Movement Direction & Performance Design for concerts, music videos, fashion campaigns, and global events. Elevating visual storytelling through motion." />
    <meta name="keywords" content="FEST Dance Company, choreography, movement direction, dance company, performance art, music video choreography, commercial movement, dance production" />
    <meta name="author" content="FEST Dance Company" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English, Polish" />
    <link rel="canonical" href="https://festdance.company" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://festdance.company" />
    <meta property="og:title" content="FEST Dance Company | Choreography & Movement Direction" />
    <meta property="og:description" content="Premium Movement Direction & Performance Design. Elevating visual storytelling for music videos, commercials, and live events." />
    <meta property="og:image" content="https://festdance.company/og-image.png" />
    <meta property="og:site_name" content="FEST Dance Company" />
    <meta property="og:locale" content="pl_PL" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://festdance.company" />
    <meta property="twitter:title" content="FEST Dance Company | Choreography & Movement Direction" />
    <meta property="twitter:description" content="Premium Movement Direction & Performance Design. Elevating visual storytelling for music videos, commercials, and live events." />
    <meta property="twitter:image" content="https://festdance.company/og-image.png" />
    <meta name="twitter:site" content="@fest_dance_company" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FEST Dance Company",
      "url": "https://festdance.company",
      "logo": "https://festdance.company/apple-touch-icon.png",
      "description": "Premium Choreography, Movement Direction & Performance Design for concerts, music videos, and fashion campaigns.",
      "sameAs": [
        "https://www.instagram.com/fest_dance_company/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "inquiry",
        "email": "festdancecompany@gmail.com"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Koncerty",
              "description": "Oprawa choreograficzna koncertów i tras z ruchem scenicznym szytym pod artystę."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Teledyski",
              "description": "Ruch dla kamery, który prowadzi emocję utworu i zostaje w pamięci widza."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Eventy",
              "description": "Spektakularne openingi, gale i wydarzenia firmowe z konceptem ruchowym od A do Z."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Kampanie",
              "description": "Choreografia i performance dla marek, które chcą mówić obrazem, nie tylko copy."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
